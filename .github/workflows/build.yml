name: build-windows-exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure project
        run: cmake -S . -B build -A x64 -DDAW_BUILD_PLUGIN_HOST_TARGET=ON

      - name: Build project
        run: cmake --build build --config Release

      - name: Upload executable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DAWCloudTemplate-windows-x64
          path: |
            build/bin/Release/DAWCloudTemplate.exe
            build/bin/Release/DAWCloudPluginHost.exe
          if-no-files-found: error
